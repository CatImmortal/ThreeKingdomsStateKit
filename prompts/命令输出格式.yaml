命令输出格式:
  目标:
    - 正文正常输出；只有发生状态变化时，才在回复末尾追加命令块。
    - 命令块只用于驱动三国霸主系统数据层，不属于正文内容。
    - 只能输出白名单命令与字段。
  全局规则:
    - 更新块固定放在回复最末尾，格式必须为 `<UpdateVariable><Analysis>...</Analysis><Commands>...</Commands></UpdateVariable>`。
    - `Commands` 必须是合法 JSON 数组，不带注释、解释或 markdown 代码块。
    - 每个命令对象都必须有 `type`，且只能使用白名单字段。
    - 不允许输出任何 `_` 开头字段。
    - 同一回合可输出多条命令，按数组顺序执行。
    - 只写本回合实际发生变化的字段；不要写推测性变化。
    - `id` 必须稳定可复用。
    - 名称字段必须显式提供，不能依赖外层 key 推断。
    - 没有状态变化时，不要输出 `UpdateVariable` 块。
  标签模板: |-
    ${正常叙事正文}

    <UpdateVariable>
    <Analysis>$(不超过150词)
    - ${经过时间: 从上一时间点到现在经过了多久}
    - ${场景类型: 日常/社交/检定/战斗/经营/军队战/军团战}
    - ${基于当前回复，逐项分析本回合哪些变量需要更新、哪些不需要更新}
    </Analysis>
    <Commands>
    [
      { "type": "命令名", "...": "..." }
    ]
    </Commands>
    </UpdateVariable>
  枚举白名单:
    当前剧本: [S1黄巾起义, S2讨伐董卓]
    品质: [N, R, SR, SSR, UR]
    装备品质: [凡品, 良品, 上品, 极品, 传说, 神话, 无]
    武技等级: [入门, 精通, 大成, 绝学, 神技]
    武技类型: [攻击, 防御, 辅助, 反击]
    武将性格: [义士, 利己, 野心家, 愚忠, 傲气, 感恩]
    武将状态: [待命, 驻守, 随军, 执行指令, 受伤, 被俘, 阵亡]
    美人位份: [未纳入, 通房, 侍妾, 姬妾, 侧妃, 正妻, 禁脔]
    美人性格: [温柔, 贞烈, 高冷, 娇蛮, 多情, 病娇, 善妒]
    美人状态: [正常, 怀孕, 产后, 生病, 被囚, 失踪]
    任务类型: [主线, 支线, 隐藏, 史诗, 成就, 委托]
    任务状态: [可接取, 进行中, 可提交, 已完成, 已失败, 已过期]
    任务目标类型: [主要, 次要, 隐藏]
    任务目标状态: [未发现, 未完成, 已完成]
  共享子结构:
    世界事件输入:
      事件名: string
      简述: string
      日期: string
    六维基础字段:
      武力: number
      智力: number
      统率: number
      政治: number
      魅力: number
      体质: number
    装备条目:
      名称: string
      品质: 装备品质
      类型: string
      描述: string
      伤害骰: string
      先攻加值: number
      攻击加值: number
      防御DC加值: number
      伤害减免: number
      其他效果: string
    装备栏:
      主武器: 装备条目 | 无
      副武器: 装备条目 | 无
      护甲: 装备条目 | 无
      坐骑: 装备条目 | 无
      饰品1: 装备条目 | 无
      饰品2: 装备条目 | 无
      饰品3: 装备条目 | 无
    状态记录: Record<string, { 效果: string, 剩余: string }>
    武技条目:
      名称: string
      等级: 武技等级
      类型: 武技类型
      效果: string
      熟练度: number
      体力消耗: number
    专长条目:
      名称: string
      等级: string
      效果: string
    角色战斗数据基础字段:
      六维: 六维基础字段
      当前生命值: number
      当前体力值: number
      装备: 装备栏
      武技: Record<string, 武技条目>
      专长: Record<string, 专长条目>
      状态: 状态记录
    物品栏条目:
      品质: 装备品质
      描述: string
      数量: number
    武将信息:
      野心值: number
      性格: 武将性格
      官职: string
      当前状态: 武将状态
      状态描述: string
      驻扎地: string
      特技: Record<string, string>
    美人属性:
      依赖度: number
      敏感度: number
      贞洁度: number
      位份: 美人位份
      性格: 美人性格
      当前状态: 美人状态
    任务目标更新:
      类型: 任务目标类型
      状态: 任务目标状态
      描述: string
      积分: number
      其他奖励: string
    商品条目:
      名称: string
      分类: string
      价格: number
      描述: string
  命令白名单:
    UpdateWorld:
      必填字段: [type, changes]
      changes可填字段:
        当前时间: string
        当前地点: string
        当前剧本: 当前剧本
        天气: string
        近期事件: 世界事件输入[]
      关键约束:
        - `changes` 至少包含一个字段
        - 追加单条事件优先用 `AppendRecentEvent`
      示例: |-
        {
          "type": "UpdateWorld",
          "changes": { "当前时间": "建安元年三月初三", "当前地点": "洛阳" }
        }
    AppendRecentEvent:
      必填字段: [type, event]
      event字段: 世界事件输入
      关键约束:
        - 仅用于追加单条新事件
      示例: |-
        {
          "type": "AppendRecentEvent",
          "event": {
            "事件名": "斩杀敌先锋",
            "简述": "主角在阵前取胜，士气大振。",
            "日期": "建安元年三月初三"
          }
        }
    UpdatePlayerBase:
      必填字段: [type, changes]
      changes可填字段:
        六维: 六维基础字段
        当前生命值: number
        当前体力值: number
        装备: 装备栏
        武技: Record<string, 武技条目>
        专长: Record<string, 专长条目>
        状态: 状态记录
        物品栏: Record<string, 物品栏条目>
        声望: number
        金钱: number
        积分: number
        官职: string
        爵位: string
        后宫和谐度: number
      关键约束:
        - `changes` 至少包含一个字段
        - 小幅资源增减优先用 `AdjustPlayerResource`
      示例: |-
        {
          "type": "UpdatePlayerBase",
          "changes": {
            "官职": "校尉",
            "六维": { "武力": 68, "统率": 61 }
          }
        }
    AdjustPlayerResource:
      必填字段: [type, changes]
      可选字段: [mode]
      changes可填字段:
        当前生命值: number
        当前体力值: number
        声望: number
        金钱: number
        积分: number
        后宫和谐度: number
      关键约束:
        - `mode` 缺省时为 `delta`
        - 只允许资源字段
      示例: |-
        {
          "type": "AdjustPlayerResource",
          "mode": "delta",
          "changes": { "当前生命值": -12, "声望": 3 }
        }
    UpsertNpc:
      必填字段: [type, id, data]
      可选字段: [createIfMissing]
      data可填字段:
        名称: string
        品质: 品质
        阵营: string
        定位: string
        好感: number
        简述: string
        羁绊: Record<string, string>
        角色数据: 角色战斗数据基础字段
        武将信息: 武将信息
        美人属性: 美人属性
      关键约束:
        - `data` 至少包含一个字段
        - 名称建议显式提供
        - 只填写正文中明确出现或可直接推出的 NPC 信息
        - 若正文只出现基础身份信息，则只写基础字段；不要自动补全详细面板
        - `角色数据` / `武将信息` / `美人属性` 只有正文明确出现对应具体数据时才允许写入
        - 正文未提及的详细字段不要猜测、不要臆造、不要输出空对象
        - 正文未提及详细字段时，不输出这些字段即可，旧详细数据会保持不变
      示例: |-
        {
          "type": "UpsertNpc",
          "id": "npc_zhaoyun",
          "data": {
            "名称": "赵云",
            "品质": "SSR",
            "阵营": "蜀",
            "定位": "武将",
            "简述": "白马银枪，随刘备同行。"
          }
        }
    UpdateNpcRelation:
      必填字段: [type, id]
      可选字段: [mode, 好感, 羁绊]
      关键约束:
        - `好感` 与 `羁绊` 至少提供一个
        - `mode` 仅对 `好感` 生效
      示例: |-
        {
          "type": "UpdateNpcRelation",
          "id": "npc_zhaoyun",
          "mode": "delta",
          "好感": 6
        }
    RemoveNpc:
      必填字段: [type, id]
      示例: |-
        {
          "type": "RemoveNpc",
          "id": "bandit_leader"
        }
    UpsertQuest:
      必填字段: [type, id, data]
      可选字段: [createIfMissing]
      data可填字段:
        名称: string
        类型: 任务类型
        状态: 任务状态
        时限: string
        目标: Record<string, 任务目标更新>
      关键约束:
        - `data` 至少包含一个字段
        - 名称必须显式提供
      示例: |-
        {
          "type": "UpsertQuest",
          "id": "quest_bandit_camp",
          "data": {
            "名称": "清剿山匪营地",
            "状态": "进行中"
          }
        }
    UpdateQuestState:
      必填字段: [type, id, 状态]
      可选字段: [目标]
      目标可填字段:
        类型: 任务目标类型
        状态: 任务目标状态
        描述: string
        积分: number
        其他奖励: string
      关键约束:
        - 只推进状态，不重写整个任务
      示例: |-
        {
          "type": "UpdateQuestState",
          "id": "quest_bandit_camp",
          "状态": "可提交"
        }
    RemoveQuest:
      必填字段: [type, id]
      示例: |-
        {
          "type": "RemoveQuest",
          "id": "expired_side_001"
        }
    UpsertShopItem:
      必填字段: [type, id, data]
      可选字段: [createIfMissing]
      data可填字段:
        名称: string
        分类: string
        价格: number
        描述: string
      关键约束:
        - `data` 至少包含一个字段
        - 名称建议显式提供
      示例: |-
        {
          "type": "UpsertShopItem",
          "id": "item_healing_herb",
          "data": {
            "名称": "止血草",
            "分类": "药品",
            "价格": 80,
            "描述": "可用于简单止血疗伤。"
          }
        }
    RemoveShopItem:
      必填字段: [type, id]
      示例: |-
        {
          "type": "RemoveShopItem",
          "id": "limited_offer_001"
        }
  最终检查清单:
    - 是否先写正文，再在最末尾输出命令块
    - 是否只使用了白名单命令与字段
    - 是否显式提供了需要的名称字段
    - 是否误写了 `_` 开头字段
    - 是否输出了合法 JSON
